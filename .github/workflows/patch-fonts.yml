name: Patch Lesson Font Sizes

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Patch font sizes in all lessons
        run: python patch_font_sizes.py

      - name: Commit and push
        run: |
          git config user.email "88954557+allie0132@users.noreply.github.com"
          git config user.name "allie0132"
          git add daily-lessons/
          git diff --staged --quiet || git commit -m "Patch: bigger fonts across all existing lessons"
          git push

name: Daily Semiconductor Lesson

on:
  schedule:
    - cron: '5 12 * * 1-5'   # 8:05am ET, weekdays
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate lesson
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python generate_lesson.py

      - name: Commit and push
        run: |
          git config user.email "oarcl132@gmail.com"
          git config user.name "allie0132"
          git add daily-lessons/ index.html
          git diff --staged --quiet || git commit -m "lesson: $(date +%Y-%m-%d)"
          git push
